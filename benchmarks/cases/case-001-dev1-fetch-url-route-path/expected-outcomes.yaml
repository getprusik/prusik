defect_class: assertion-depth-fetch-url
mechanism: template-fetch-URL vs prefixed-route-path
trial_origin: m4-dev1-jit-inline-client-fix (2026-05-18)

# Each entry: which check to run + what it should report on initial-repo
# vs clean. The harness compares actual ledger events / output against
